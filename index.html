<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile Card</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <!-- Main Profile Card -->
    <div class="card glass-card text-center p-4">

        <img src="test.jpg" class="profile-img mx-auto" alt="Profile Image">

        <h3 class="name mt-3">Dewmini</h3>

        <p class="stream">Information System Student</p>

        <p class="bio">
            Undergraduate in information system and content creator
        </p>

        <!-- Contact Button triggers Modal -->
        <button type="button" class="btn btn-custom mt-3" data-bs-toggle="modal" data-bs-target="#contactModal">
            Contact
        </button>

    </div>

</div>

<!-- Contact Modal -->
<div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-card text-center p-4">

      <div class="modal-header border-0">
        <h5 class="modal-title name" id="contactModalLabel">Contact Me</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <p class="bio mb-4">Reach me through these platforms:</p>
        <div class="d-flex justify-content-center gap-3">

          <a href="https://www.youtube.com/" target="_blank" class="text-decoration-none social-link">
            <i class="bi bi-youtube fs-2"></i>
          </a>

          <a href="https://wa.me/1234567890" target="_blank" class="text-decoration-none social-link">
            <i class="bi bi-whatsapp fs-2"></i>
          </a>

          <a href="https://www.facebook.com/" target="_blank" class="text-decoration-none social-link">
            <i class="bi bi-facebook fs-2"></i>
          </a>

          <a href="https://www.instagram.com/" target="_blank" class="text-decoration-none social-link">
            <i class="bi bi-instagram fs-2"></i>
          </a>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
